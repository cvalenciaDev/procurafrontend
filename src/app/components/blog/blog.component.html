<div class="row g-4 mt-0">
    <div *ngFor="let item of blogData.slice(0,3)" class="col-lg-4 col-md-6">
        <div class="card blog blog-primary shadow rounded overflow-hidden border-0">
            <div class="card-img blog-image position-relative overflow-hidden rounded-0">
                <div class="position-relative overflow-hidden">
                    <img [src]="item.image" class="img-fluid" alt="">
                    <div class="card-overlay"></div>
                </div>
            </div>

            <div class="card-body blog-content position-relative p-0">
                <div class="blog-tag px-4">
                    <a [routerLink]="[]" class="badge bg-primary rounded-pill">{{item.tag}}</a>
                </div>
                <div class="p-4">
                    <ul class="list-unstyled text-muted small mb-2">
                        <li class="d-inline-flex align-items-center me-2"><i data-feather="calendar" class="fea icon-ex-sm me-1 text-dark"></i>{{item.date}}</li>
                        <li class="d-inline-flex align-items-center"><i data-feather="clock" class="fea icon-ex-sm me-1 text-dark"></i>5 min read</li>
                    </ul>

                    <a [routerLink]="['/blog-detail',item.id]" class="title fw-semibold fs-5 text-dark">{{item.title}}</a>
                    
                    <ul class="list-unstyled d-flex justify-content-between align-items-center text-muted mb-0 mt-3">
                        <li class="list-inline-item me-2"><a [routerLink]="[]" class="btn btn-link primary text-dark">Read Now <i class="mdi mdi-arrow-right"></i></a></li>
                        <li class="list-inline-item"><span class="text-dark">By</span> <a [routerLink]="[]" class="text-muted link-title">{{item.company}}</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
