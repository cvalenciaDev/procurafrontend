<div class="d-md-flex justify-content-between align-items-center bg-white shadow rounded p-2 mt-4">
  <form class="card-body text-start" (ngSubmit)="onSearch()">
    <div class="registration-form text-dark text-start">
      <div class="row g-lg-0">
        <div class="col-lg-3 col-md-6 col-12">
          <div class="mb-3 mb-sm-0">
            <label for="filter-text" class="form-label d-none fs-6">Buscar:</label>
            <div class="filter-search-form position-relative filter-border">
              <i data-feather="search" class="fea icon-20 icons"></i>
              <input id="filter-text" name="text" type="text" class="form-control filter-input-box bg-light border-0"
                placeholder="Busca tu requerimiento" [(ngModel)]="text">
            </div>
          </div>
        </div>

        <div class="col-lg-3 col-md-6 col-12">
          <div class="mb-3 mb-sm-0">
            <label for="filter-location" class="form-label d-none fs-6">Ubicación</label>
            <div class="filter-search-form position-relative filter-border">
              <i data-feather="map-pin" class="fea icon-20 icons"></i>
              <select id="filter-location" class="form-control filter-input-box bg-light border-0" [(ngModel)]="location" name="location">
                <option value="">Ubicación</option>
                <option *ngFor="let loc of locations" [value]="loc">{{ loc }}</option>
              </select>
            </div>
          </div>
        </div>

        <div class="col-lg-3 col-md-6 col-12">
          <div class="mb-3 mb-sm-0">
            <label for="filter-category" class="form-label d-none fs-6">Categoría:</label>
            <div class="filter-search-form position-relative filter-border">
              <i data-feather="briefcase" class="fea icon-20 icons"></i>
              <select id="filter-category" class="form-control filter-input-box bg-light border-0" [(ngModel)]="category" name="category">
                <option value="">Categoría</option>
                <option *ngFor="let cat of categories" [value]="cat.value">{{ cat.label }}</option>
              </select>
            </div>
          </div>
        </div>

        <div class="col-lg-3 col-md-6 col-12 d-flex gap-2">
          <button type="submit" style="height: 60px;" class="btn btn-primary searchbtn flex-fill">Buscar</button>
          <button type="button" style="height: 60px;" class="btn btn-outline-secondary" (click)="onReset()" *ngIf="text || location || category">
            <i data-feather="x" class="fea icon-sm"></i>
          </button>
        </div>
      </div>
    </div>
  </form>
</div>
