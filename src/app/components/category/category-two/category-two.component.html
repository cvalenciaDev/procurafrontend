<div class="row row-cols-lg-5 row-cols-md-3 row-cols-sm-2 row-cols-1 g-4 mt-0">
    <div *ngFor="let item of categoryData" class="col">
        <div class="job-category job-category-two rounded shadow bg-light p-3">
            <h5 class="mb-1">{{item.title}}</h5>
            <p class="text-muted para mb-2">{{item.job}}</p>
            <a [routerLink]="[]" class="text-primary fw-medium link">Explore Jobs <i class="mdi mdi-arrow-right"></i></a>
        </div>
    </div>
</div>
