<div class="row g-4 mt-0">
    <div *ngFor="let item of jobData.slice(0,8)" class="col-12">
        <div class="job-post job-post-list rounded shadow p-4 d-md-flex align-items-center justify-content-between position-relative">
            <div class="d-flex align-items-center w-310px">
                <img [src]="item.image" class="avatar avatar-small rounded shadow p-3 bg-white" alt="">

                <div class="ms-3">
                    <a [routerLink]="['/job-detail-one', item.id]" class="h5 title text-dark">{{item.title}}</a>
                </div>
            </div>

            <div class="d-flex align-items-center justify-content-between d-md-block mt-3 mt-md-0 w-100px">
                <span class="badge bg-soft-primary rounded-pill">{{item.jobType}}</span>
                <span class="text-muted d-flex align-items-center fw-medium mt-md-2"><i data-feather="clock" class="fea icon-sm me-1 align-middle"></i>{{item.posted}}</span>
            </div>

            <div class="d-flex align-items-center justify-content-between d-md-block mt-2 mt-md-0 w-130px">
                <span class="text-muted d-flex align-items-center"><i data-feather="map-pin" class="fea icon-sm me-1 align-middle"></i>{{item.location}}</span>
                <span class="d-flex fw-medium mt-md-2">{{item.salary}}</span>
            </div>

            <div class="mt-3 mt-md-0">
                <a [routerLink]="[]" class="btn btn-sm btn-icon btn-pills btn-soft-primary bookmark"><i data-feather="bookmark" class="icons"></i></a>
                <a [routerLink]="['/job-detail-one', item.id]" class="btn btn-sm btn-primary w-full ms-md-1">Apply Now</a>
            </div>
        </div>
    </div>

    <div class="col-12">
        <div class="text-center">
            <a [routerLink]="'/job-list-one'" class="btn btn-link primary text-muted">See More Jobs <i class="mdi mdi-arrow-right"></i></a>
        </div>
    </div>
</div>
