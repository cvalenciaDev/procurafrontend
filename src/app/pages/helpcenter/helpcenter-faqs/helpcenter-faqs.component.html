<app-navbar/>

<section class="bg-half-170 d-table w-100" style="background: url('/assets/images/hero/bg.jpg');">

    <div class="container">
        <div class="row mt-5 justify-content-center">
            <div class="col-12">
                <div class="title-heading text-center">

                </div>
            </div>
        </div>

        <div class="position-middle-bottom">
            <nav aria-label="breadcrumb" class="d-block">
                <ul class="breadcrumb breadcrumb-muted mb-0 p-0">
                    <li class="breadcrumb-item"><a [routerLink]="'/'">Jobnova</a></li>
                    <li class="breadcrumb-item"><a [routerLink]="'/helpcenter-overview'">Help Center</a></li>
                    <li class="breadcrumb-item active" aria-current="page">FAQs</li>

        </div>
    </div>
</section>
<div class="position-relative">
    <div class="shape overflow-hidden text-white">
        <svg viewBox="0 0 2880 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 48H1437.5H2880V0H2160C1442.5 52 720 0 720 0H0V48Z" fill="currentColor"></path>
        </svg>
    </div>
</div>

  <section class="section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-5 col-12 d-none d-md-block">
                <div class="rounded shadow p-4 sticky-bar">
                    <ul class="list-unstyled sidebar-nav mb-0 py-0" id="navmenu-nav">
                        <li class="navbar-item p-0" [class.active]="activeSections.has('tech')"><a [routerLink]="[]" (click)="scrollToSection('tech')" class="h6 text-dark navbar-link">Buying Questions</a></li>
                        <li class="navbar-item mt-3 p-0" [class.active]="activeSections.has('general')"><a [routerLink]="[]" (click)="scrollToSection('general')" class="h6 text-dark navbar-link">General Questions</a></li>
                        <li class="navbar-item mt-3 p-0" [class.active]="activeSections.has('payment')"><a [routerLink]="[]" (click)="scrollToSection('payment')" class="h6 text-dark navbar-link">Payments Questions</a></li>
                        <li class="navbar-item mt-3 p-0" [class.active]="activeSections.has('support')"><a [routerLink]="[]" (click)="scrollToSection('support')" class="h6 text-dark navbar-link">Support Questions</a></li>
                    </ul>
                </div>
            </div>

            <div class="col-lg-8 col-md-7 col-12">
                <div class="section-title" id="tech">

                    <app-faq/>

                <div class="section-title mt-5" id="general">
                    <h4>General Questions</h4>
                    <app-faq/>
                </div>

                <div class="section-title mt-5" id="payment">
                    <h4>Payments Questions</h4>
                    <app-faq/>
                </div>

                <div class="section-title mt-5" id="support">
                    <h4>Support Questions</h4>
                    <app-faq/>

        </div>
