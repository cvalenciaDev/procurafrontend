<section class="bg-home d-flex align-items-center" style="background: url('/assets/images/hero/bg2.jpg') top;">
    <div class="bg-overlay bg-gradient-overlay"></div>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-12 text-center">
                <a [routerLink]="'/'">
                    <img [src]="'/assets/images/logo-icon-80-white.png'" alt="">
                </a>
                <h2 class="title-dark text-white text-uppercase mt-2 mb-4 fw-semibold">We are back soon...</h2>
                <p class="text-white-50 para-desc para-dark mx-auto">Find Jobs, Employment & Career Opportunities. Some of the companies we've helped recruit excellent applicants over the years.</p>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12 text-center">
                <div class="text-center">
                    <span id="maintenance" class="timer">{{minutes}}:{{remainingSeconds}}</span><span class="d-block h6 text-uppercase text-white title-dark">Minutes</span>
                </div>
            </div>
        </div>

        <div class="row mt-4 pt-2">
            <div class="col-12 text-center">
                <div class="subscribe-form">
                    <form class="mx-auto">
                        <input name="email" id="email" type="email" class="rounded-pill bg-white" required="" placeholder="Your email :">
                        <button type="submit" class="btn btn-primary rounded-pill">Subscribe</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
