<app-navbar/>

<section class="bg-half-170 d-table w-100" style="background: url('/assets/images/hero/bg.jpg');">
    <div class="bg-overlay bg-gradient-overlay"></div>
    <div class="container">
        <div class="row mt-5 justify-content-center">
            <div class="col-12">
                <div class="title-heading text-center">
                    <h5 class="heading fw-semibold mb-0 sub-heading text-white title-dark">Empresas Candidatos</h5>
                </div>
            </div>
        </div>

    </div>
</section>
<div class="position-relative">
    <div class="shape overflow-hidden text-white">
        <svg viewBox="0 0 2880 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 48H1437.5H2880V0H2160C1442.5 52 720 0 720 0H0V48Z" fill="currentColor"></path>
        </svg>
    </div>
</div>

<section class="section">
    <div class="container">
        <div class="row g-4">
            <div *ngFor="let item of candidateData" class="col-lg-3 col-md-4 col-sm-6 col-12">
                <div class="candidate-card position-relative overflow-hidden text-center shadow rounded p-4">
                    <div *ngIf="item.rate" class="ribbon ribbon-left overflow-hidden"><span class="text-center d-block bg-warning shadow small h6"><i class="mdi mdi-star"></i></span></div>
                    <div class="content">
                        <img [src]="item.image" class="avatar avatar-md-md rounded-pill shadow-md" alt="">

                        <div class="mt-3">
                            <a [routerLink]="['/candidate-profile',item.id]" class="title h5 text-dark">{{item.name}}</a>
                            <p class="text-muted mt-1">{{item.position}}</p>

                            <span *ngFor="let el of item.feature" class="badge bg-soft-primary rounded-pill">{{el}}</span>
                        </div>

                        <div class="mt-2 d-flex align-items-center justify-content-between">
                            <div class="text-center">
                                <p class="text-muted fw-medium mb-0">Salary:</p>
                                <p class="mb-0 fw-medium">{{item.salary}}</p>
                            </div>

                            <div class="text-center">
                                <p class="text-muted fw-medium mb-0">Experience:</p>
                                <p class="mb-0 fw-medium">{{item.experience}}</p>
                            </div>
                        </div>
                        
                        <div class="mt-3">
                            <a [routerLink]="['/candidate-profile',item.id]" class="btn btn-sm btn-primary me-1">View Profile</a>
                            <a [routerLink]="'/contactus'" class="btn btn-sm btn-icon btn-soft-primary"><i data-feather="message-circle" class="icons"></i></a>
                        </div>

                        <a [routerLink]="[]" class="like"><i class="mdi mdi-heart align-middle fs-4"></i></a>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12 mt-4 pt-2">
                <ul class="pagination justify-content-center mb-0">
                    <li class="page-item">
                        <a class="page-link" [routerLink]="[]" aria-label="Previous">
                            <span aria-hidden="true"><i class="mdi mdi-chevron-left fs-6"></i></span>
                        </a>
                    </li>
                    <li class="page-item"><a class="page-link" [routerLink]="[]">1</a></li>
                    <li class="page-item active"><a class="page-link" [routerLink]="[]">2</a></li>
                    <li class="page-item"><a class="page-link" [routerLink]="[]">3</a></li>
                    <li class="page-item">
                        <a class="page-link" [routerLink]="[]" aria-label="Next">
                            <span aria-hidden="true"><i class="mdi mdi-chevron-right fs-6"></i></span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</section>
<app-footer-top/>
<app-scroll-to-top/>
